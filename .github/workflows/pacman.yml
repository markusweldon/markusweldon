name: Pac-Man Contribution Graph

on:
  schedule:
    - cron: "0 0 * * *"   # Daily at midnight UTC
  workflow_dispatch:
  push:
    branches: ["main", "master"]

permissions:
  contents: write

env:
  # Node 20 is deprecated on runners (forced to Node 24 from 2026-06-16).
  # Opt in now so these JS actions keep running.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Pac-Man contribution graph
        id: pacman
        continue-on-error: true
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: markusweldon
          github_token: ${{ secrets.METRICS_TOKEN }}

      - name: Verify graph was generated
        id: check
        run: |
          if [ -d dist ] && [ -n "$(ls -A dist 2>/dev/null)" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "Generated files:"
            ls -la dist
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Pac-Man generation produced no output this run (transient API issue); keeping the existing graph on the output branch."
          fi

      - name: Recolor for dark mode
        if: steps.check.outputs.ok == 'true'
        run: |
          for f in dist/*.svg; do
            # The action emits a light-themed SVG with a white background and
            # black maze walls — invisible/jarring on a dark-first profile.
            # Recolor in place for a transparent, dark-friendly graph.
            sed -i \
              -e 's|<rect width="100%" height="100%" fill="#ffffff"/>||g' \
              -e 's|#ebedf0|#161b22|g' \
              -e 's|#000000|#6e7681|g' \
              -e 's|#57606a|#8b949e|g' \
              "$f"
          done
          echo "Recolored $(ls dist/*.svg | wc -l) SVG(s) for dark mode."

      - name: Push to output branch
        if: steps.check.outputs.ok == 'true'
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
