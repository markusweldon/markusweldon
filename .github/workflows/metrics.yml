name: Metrics

on:
  schedule:
    - cron: "30 0 * * *"   # daily, 30 min after the Pac-Man job
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          # Commit the rendered SVG to a dedicated branch so it stays off main
          committer_token: ${{ secrets.METRICS_TOKEN }}
          committer_branch: metrics
          filename: github-metrics.svg
          user: markusweldon
          template: classic
          base: ""
          config_timezone: America/Los_Angeles
          config_animations: "yes"

          # The signature "premium" visual: isometric 3D contribution calendar
          plugin_isocalendar: "yes"
          plugin_isocalendar_duration: full-year

          # Language breadth
          plugin_languages: "yes"
          plugin_languages_indepth: "yes"
          plugin_languages_details: percentage
          plugin_languages_limit: 6

          # Synthwave theming. metrics has no dark toggle, so override its CSS.
          # (Verify + tune against the first CI-rendered SVG.)
          extras_css: |
            svg { background: #292138; color: #d9d7ee; }
            h1, h2, h3, .title { color: #D33D9B !important; }
            a, .key, .value { color: #6DE2F1 !important; }
            /* Recolor the isometric contribution calendar to a synthwave ramp.
               The cells are inline fill attributes (specificity 0), so plain
               attribute selectors override them. Low -> high activity. */
            [fill="#ebedf0"] { fill: #2a2143 !important; }
            [fill="#9be9a8"] { fill: #4c3f72 !important; }
            [fill="#40c463"] { fill: #8957E5 !important; }
            [fill="#30a14e"] { fill: #D33D9B !important; }
            [fill="#216e39"] { fill: #6DE2F1 !important; }
