name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"   # Once daily at midnight UTC — preserves rate limits
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ─────────────────────────────────────────────
      # 1. STATS CARD
      #    Shows: commits, PRs, issues, rank
      # ─────────────────────────────────────────────
      - name: Stats Card
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.stats.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: markusweldon
          template: classic
          base: activity, community, repositories, metadata
          config_timezone: America/Los_Angeles
          config_display: large
          retries: 3
          retries_delay: 300
          extras_css: |
            svg { background: #292138 !important; }
            text { fill: #ffffff !important; }
            .rank-circle-rim { stroke: #D33D9B !important; }
            .rank-circle { stroke: #6DE2F1 !important; }
            .bold { fill: #D33D9B !important; }
            .icon { fill: #6DE2F1 !important; }
            .header .field .value { color: #D33D9B !important; font-weight: bold; }

      # ─────────────────────────────────────────────
      # 2. TOP LANGUAGES CARD
      # ─────────────────────────────────────────────
      - name: Languages Card
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: markusweldon
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_limit: 10
          plugin_languages_sections: most-used
          plugin_languages_details: percentage, bytes-size
          plugin_languages_colors: github
          config_timezone: America/Los_Angeles
          retries: 3
          retries_delay: 300
          extras_css: |
            svg { background: #292138 !important; }
            text { fill: #ffffff !important; }
            .progress-bg { fill: #3d2f5e !important; }
            .bold { fill: #D33D9B !important; }
            .icon { fill: #6DE2F1 !important; }

      # ─────────────────────────────────────────────
      # 3. ISOMETRIC CALENDAR — Full Year
      # ─────────────────────────────────────────────
      - name: Isometric Calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: markusweldon
          template: classic
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: America/Los_Angeles
          retries: 3
          retries_delay: 300
          extras_css: |
            svg { background: #292138 !important; }
            text { fill: #ffffff !important; }
            .isocalendar .commit { fill: #D33D9B !important; }
            .isocalendar .commit-light { fill: #6DE2F1 !important; }
