name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"   # Once daily at midnight UTC — preserves rate limits
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ─────────────────────────────────────────────
      # 1. STATS CARD (replaces github-readme-stats)
      #    Shows: commits, PRs, issues, rank
      # ─────────────────────────────────────────────
      - name: Stats Card
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.stats.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: markusweldon
          template: classic
          base: activity, community, repositories, metadata
          config_timezone: America/Los_Angeles
          config_display: large
          retries: 3
          retries_delay: 300
          extras_css: |
            svg { background: #292138 !important; }
            text { fill: #ffffff !important; }
            .rank-circle-rim { stroke: #D33D9B !important; }
            .rank-circle { stroke: #6DE2F1 !important; }
            .bold { fill: #D33D9B !important; }
            .icon { fill: #6DE2F1 !important; }
            .header .field .value { color: #D33D9B !important; font-weight: bold; }

      # ─────────────────────────────────────────────
      # 2. TOP LANGUAGES CARD (replaces github-readme-stats top-langs)
      #    indepth removed — too API-heavy
      # ─────────────────────────────────────────────
      - name: Languages Card
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: markusweldon
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_limit: 10
          plugin_languages_sections: most-used
          plugin_languages_details: percentage, bytes-size
          plugin_languages_colors: github
          config_timezone: America/Los_Angeles
          retries: 3
          retries_delay: 300
          extras_css: |
            svg { background: #292138 !important; }
            text { fill: #ffffff !important; }
            .progress-bg { fill: #3d2f5e !important; }
            .bold { fill: #D33D9B !important; }
            .icon { fill: #6DE2F1 !important; }

      # ─────────────────────────────────────────────
      # 3. ACHIEVEMENTS
      #    Unlockable GitHub badges — unique flex
      # ─────────────────────────────────────────────
      - name: Achievements
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.achievements.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: markusweldon
          template: classic
          base: ""
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_display: detailed
          plugin_achievements_limit: 0
          plugin_achievements_secrets: yes
          config_timezone: America/Los_Angeles
          retries: 3
          retries_delay: 300
          extras_css: |
            svg { background: #292138 !important; }
            text { fill: #ffffff !important; }
            .bold { fill: #D33D9B !important; }
            .icon { fill: #6DE2F1 !important; }

      # ─────────────────────────────────────────────
      # 4. NOTABLE CONTRIBUTIONS
      #    Shows impactful contributions to other repos
      # ─────────────────────────────────────────────
      - name: Notable Contributions
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.notable.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: markusweldon
          template: classic
          base: ""
          plugin_notable: yes
          plugin_notable_indepth: yes
          plugin_notable_repositories: yes
          plugin_notable_types: commit, pull_request, issue
          config_timezone: America/Los_Angeles
          retries: 3
          retries_delay: 300
          extras_css: |
            svg { background: #292138 !important; }
            text { fill: #ffffff !important; }
            .bold { fill: #D33D9B !important; }
            .icon { fill: #6DE2F1 !important; }

      # ─────────────────────────────────────────────
      # 5. ISOMETRIC CALENDAR — Full Year
      #    3D isometric view of your contribution graph
      # ─────────────────────────────────────────────
      - name: Isometric Calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: markusweldon
          template: classic
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: America/Los_Angeles
          retries: 3
          retries_delay: 300
          extras_css: |
            svg { background: #292138 !important; }
            text { fill: #ffffff !important; }
            .isocalendar .commit { fill: #D33D9B !important; }
            .isocalendar .commit-light { fill: #6DE2F1 !important; }

      # ─────────────────────────────────────────────
      # 6. RECENT ACTIVITY FEED
      #    Last 5 GitHub events — commits, PRs, issues
      # ─────────────────────────────────────────────
      - name: Recent Activity
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.activity.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: markusweldon
          template: classic
          base: ""
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: push, pr, issue, release, review
          config_timezone: America/Los_Angeles
          retries: 3
          retries_delay: 300
          extras_css: |
            svg { background: #292138 !important; }
            text { fill: #ffffff !important; }
            .bold { fill: #D33D9B !important; }
            .icon { fill: #6DE2F1 !important; }

      # ─────────────────────────────────────────────
      # 7. STARRED TOPICS
      #    Shows your GitHub starred topics/interests
      # ─────────────────────────────────────────────
      - name: Starred Topics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.topics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: markusweldon
          template: classic
          base: ""
          plugin_topics: yes
          plugin_topics_limit: 20
          plugin_topics_mode: icons
          config_timezone: America/Los_Angeles
          retries: 3
          retries_delay: 300
          extras_css: |
            svg { background: #292138 !important; }
            text { fill: #ffffff !important; }
            .bold { fill: #D33D9B !important; }
