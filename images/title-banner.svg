    <text x="500" y="62" font-size="50" font-weight="900" letter-spacing="2" fill="url(#g)" filter="url(#halo2)">PRINCIPAL SOLUTIONS ENGINEER<animate attributeName="opacity" values="1;0.5;1" dur="4s" repeatCount="indefinite"/></text>
    <text x="500" y="62" font-size="50" font-weight="900" letter-spacing="2" fill="url(#g)" filter="url(#halo)" opacity="0.9">PRINCIPAL SOLUTIONS ENGINEER</text>
    <text x="500" y="62" font-size="50" font-weight="900" letter-spacing="2" fill="url(#g)">PRINCIPAL SOLUTIONS ENGINEER</text>
    <text x="500" y="110" font-size="27" font-weight="600" letter-spacing="1" fill="#6DE2F1">Helping enterprises adopt AI-assisted development securely</text>
